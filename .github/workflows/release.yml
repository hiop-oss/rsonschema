name: release

on:
  workflow_dispatch:

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  release-rust:
    needs: validate
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: setup rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: install cargo-release
        run: cargo install cargo-release

      - name: cargo login
        run: cargo login ${{ secrets.CRATES_IO_TOKEN }}

      - name: setup git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: release rust library
        run: cargo release --execute --no-confirm --tag-prefix "" --unpublished

      - name: output tag
        id: tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

  build-python-wheels:
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          manylinux: auto

      - uses: actions/upload-artifact@v7
        with:
          name: python-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/

  release-python:
    needs: build-python-wheels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    needs: [release-rust, release-python]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-rust.outputs.tag }}

  update-branches:
    needs: [release-rust, release-python]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: merge master -> develop
        uses: devmasx/merge-branch@v1.4.0
        with:
          from_branch: master
          target_branch: develop
          github_token: ${{ github.token }}
          type: now

      - uses: actions/checkout@v6
        with:
          ref: develop

      - name: install cargo-release
        run: cargo install cargo-release

      - name: setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

      - name: update version
        run: |
          cargo release version patch --execute --no-confirm
          git add Cargo.toml
          git commit --message "ci: update patch version"
          git push
